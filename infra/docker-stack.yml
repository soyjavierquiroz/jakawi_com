version: "3.8"

services:
  web:
    image: jakawi-com-web:latest
    environment:
      NODE_ENV: production
      PORT: 3000
      APP_URL: ${APP_URL}
      PUBLIC_APP_URL: ${PUBLIC_APP_URL}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME}
      SESSION_SECRET: ${SESSION_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      CRON_SECRET: ${CRON_SECRET}
      UPLOAD_SECRET: ${UPLOAD_SECRET}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL}
      S3_BUCKET: ${S3_BUCKET}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE}
      CRM_WEBHOOK_ENABLED: ${CRM_WEBHOOK_ENABLED}
      CRM_WEBHOOK_URL: ${CRM_WEBHOOK_URL}
      CRM_WEBHOOK_SECRET: ${CRM_WEBHOOK_SECRET}
      CRM_WEBHOOK_TIMEOUT_MS: ${CRM_WEBHOOK_TIMEOUT_MS}
      CRM_WEBHOOK_QA_ONLY: ${CRM_WEBHOOK_QA_ONLY}
      CUSTOM_DOMAINS_ENABLED: ${CUSTOM_DOMAINS_ENABLED}
      CLOUDFLARE_CUSTOM_HOSTNAMES_ENABLED: ${CLOUDFLARE_CUSTOM_HOSTNAMES_ENABLED}
      META_CAPI_ENABLED: ${META_CAPI_ENABLED}
      EMAIL_DELIVERY_MODE: ${EMAIL_DELIVERY_MODE}
    networks:
      - jakawi_internal
      - drenvex_network
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=drenvex_network"
        - "traefik.http.routers.jakawi_web.rule=Host(`jakawi.com`) || Host(`www.jakawi.com`)"
        - "traefik.http.routers.jakawi_web.entrypoints=websecure"
        - "traefik.http.routers.jakawi_web.tls=true"
        - "traefik.http.routers.jakawi_web.tls.certresolver=myresolver"
        - "traefik.http.routers.jakawi_web.service=jakawi_web"
        - "traefik.http.services.jakawi_web.loadbalancer.server.port=3000"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - jakawi_postgres_data:/var/lib/postgresql/data
    networks:
      - jakawi_internal
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - jakawi_redis_data:/data
    networks:
      - jakawi_internal
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BROWSER_REDIRECT_URL: ${MINIO_BROWSER_REDIRECT_URL}
      MINIO_SERVER_URL: ${MINIO_SERVER_URL}
      MINIO_API_CORS_ALLOW_ORIGIN: "https://jakawi.com"
      MINIO_API_CORS_ALLOW_METHODS: "GET,HEAD,PUT,POST,DELETE"
      MINIO_API_CORS_ALLOW_HEADERS: "*"
    volumes:
      - jakawi_minio_data:/data
    networks:
      - jakawi_internal
      - drenvex_network
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "0.5"
          memory: 1024M
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=drenvex_network"
        - "traefik.http.routers.jakawi_minio_s3.rule=Host(`media.jakawi.com`)"
        - "traefik.http.routers.jakawi_minio_s3.entrypoints=websecure"
        - "traefik.http.routers.jakawi_minio_s3.tls=true"
        - "traefik.http.routers.jakawi_minio_s3.tls.certresolver=myresolver"
        - "traefik.http.routers.jakawi_minio_s3.service=jakawi_minio_s3"
        - "traefik.http.services.jakawi_minio_s3.loadbalancer.server.port=9000"
        - "traefik.http.routers.jakawi_minio_console.rule=Host(`minio.jakawi.com`)"
        - "traefik.http.routers.jakawi_minio_console.entrypoints=websecure"
        - "traefik.http.routers.jakawi_minio_console.tls=true"
        - "traefik.http.routers.jakawi_minio_console.tls.certresolver=myresolver"
        - "traefik.http.routers.jakawi_minio_console.service=jakawi_minio_console"
        - "traefik.http.routers.jakawi_minio_console.middlewares=jakawi_minio_console_auth"
        - "traefik.http.middlewares.jakawi_minio_console_auth.basicauth.users=${MINIO_BASIC_AUTH_USER}:${MINIO_BASIC_AUTH_HASH}"
        - "traefik.http.services.jakawi_minio_console.loadbalancer.server.port=9001"

  minio_init:
    image: minio/mc:latest
    entrypoint: ["/bin/sh"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET: ${S3_BUCKET}
    networks:
      - jakawi_internal
    command:
      - "-c"
      - >
        sleep 15;
        mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
        mc mb --ignore-existing local/$${S3_BUCKET};
        mc anonymous set download local/$${S3_BUCKET};
        echo 'MinIO bucket initialized';
    deploy:
      replicas: 1
      restart_policy:
        condition: none

volumes:
  jakawi_postgres_data:
  jakawi_redis_data:
  jakawi_minio_data:

networks:
  jakawi_internal:
    driver: overlay
    attachable: true
  drenvex_network:
    external: true
